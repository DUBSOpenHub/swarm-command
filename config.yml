swarm_command:
  default_scale: "ss-100"
  scales:
    ss-50:
      commanders: 3
      squad_leads_per_commander: 5
      workers_per_squad_lead: 3
      reviewers: 3
      total: ~52
    ss-100:
      commanders: 3
      squad_leads_per_commander: 6
      workers_per_squad_lead: 4
      reviewers: 6
      total: ~83
    ss-250:
      commanders: 5
      squad_leads_per_commander: 10
      workers_per_squad_lead: 5
      reviewers: 10
      total: ~268

  consensus:
    threshold_consensus: 0.70
    threshold_majority: 0.50
    formula_weights:
      confidence: 0.40
      evidence: 0.30
      scope: 0.15
      coverage: 0.15
      conflict_penalty_cap: 0.10

  depth_guard:
    max_spawn_depth: 3
    max_workers_per_squad_lead: 5
    worker_agent_types: ["explore", "task"]
    commander_agent_type: "general-purpose"

  circuit_breaker:
    commander_failure_threshold: 0.60
    worker_failure_threshold: 0.50
    timeout_cascade: [90, 60, 40, 30]
    cost_ceiling_usd: 20.00

  shadow_scoring:
    enabled: true
    spec_version: "1.0.0"
    conformance_level: "L2"
    sealed_criteria_count: 10  # criteria per task
    hardening:
      enabled: true
      max_cycles: 1
      threshold: 15  # hardening triggers if score > 15%
    categories:
      - happy_path
      - edge_case
      - error_handling
      - completeness

  models:
    commander_pool:
      - claude-opus-4.6
      - claude-sonnet-4.6
      - gpt-5.4
      - gpt-5.2
      - claude-sonnet-4.5
    worker_pool:
      - claude-haiku-4.5
      - gpt-5.4-mini
      - gpt-5-mini
      - gpt-4.1
    reviewer_pairs:
      - [claude-sonnet-4.6, gpt-5.4]
      - [claude-opus-4.5, gpt-5.2]
      - [claude-sonnet-4.5, gpt-5.1]
      - [claude-haiku-4.5, gpt-5.4-mini]
      - [goldeneye, gpt-4.1]
