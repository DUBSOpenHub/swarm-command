swarm_command:
  default_scale: "ss-100"
  scales:
    ss-50:
      commanders: 3
      workers_per_commander: 15  # No squad leads — commanders spawn workers directly
      max_depth: 2               # Nexus[0] → Commander[1] → Worker[2]
      reviewers: 3
      sealed_criteria_count: 6
      cost_ceiling_usd: 5.00
      timeout_s: 60
      total: ~52
    ss-100:
      commanders: 5
      workers_per_commander: 15  # No squad leads — commanders spawn workers directly
      max_depth: 2               # Nexus[0] → Commander[1] → Worker[2]
      reviewers: 8
      sealed_criteria_count: 8
      cost_ceiling_usd: 10.00
      timeout_s: 75
      total: ~89
    ss-250:
      commanders: 5
      squad_leads_per_commander: 10
      workers_per_squad_lead: 5
      max_depth: 3               # Nexus[0] → Commander[1] → Squad Lead[2] → Worker[3]
      reviewers: 10
      sealed_criteria_count: 10
      cost_ceiling_usd: 20.00
      timeout_s: 90
      total: ~316

  consensus:
    threshold_consensus: 0.70
    threshold_majority: 0.50
    formula_weights:
      confidence: 0.40
      evidence: 0.30
      scope: 0.15
      coverage: 0.15
      conflict_penalty_cap: 0.30

  depth_guard:
    max_spawn_depth: 3
    max_workers_per_squad_lead: 5
    worker_agent_types: ["explore", "task"]
    commander_agent_type: "general-purpose"
    depth_budget_defaults:
      architecture: 10
      implementation: 10
      testing: 7
      integration: 7
      documentation: 5
    total_squad_cap:
      ss-50: 20
      ss-100: 40
      ss-250: 60

  personality_modes:
    balanced:
      worker_count: 5
      timeout_factor: 1.0
      model_tier: "mixed"
      retry_budget: 1
    thorough:
      worker_count: 5
      timeout_factor: 1.5
      model_tier: "opus_sonnet"
      retry_budget: 2
    fast:
      worker_count: 3
      timeout_factor: 0.6
      model_tier: "haiku_only"
      retry_budget: 0
    creative:
      worker_count: 4
      timeout_factor: 1.0
      model_tier: "max_diversity"
      retry_budget: 1
    cautious:
      worker_count: 5
      timeout_factor: 1.2
      model_tier: "sonnet"
      retry_budget: 2

  meta_review:
    enabled: true
    irr_alert_threshold: 0.60
    inflation_detection_threshold: 8.5
    deflation_detection_threshold: 3.5
    herding_std_dev_threshold: 0.5
    rubber_stamp_delta_threshold: 0.05
    rubber_stamp_min_reviewers: 3

  circuit_breaker:
    commander_failure_threshold: 0.60
    worker_failure_threshold: 0.50
    timeout_cascade: [90, 60, 40, 30]
    cost_ceiling_usd: 20.00

  shadow_scoring:
    enabled: true
    spec_version: "1.0.0"
    conformance_level: "L2"
    sealed_criteria_count: 10  # criteria per task
    hardening:
      enabled: true
      max_cycles: 1
      threshold: 15  # hardening triggers if score > 15%
    categories:
      - happy_path
      - edge_case
      - error_handling
      - completeness

  models:
    commander_pool:
      - claude-opus-4.6
      - claude-opus-4.5
      - claude-opus-4.6-1m
      - claude-sonnet-4.6
      - claude-sonnet-4.5
      - claude-sonnet-4
      - gpt-5.4
      - gpt-5.2
      - gpt-5.1
      - goldeneye
    worker_pool:
      - claude-haiku-4.5
      - gpt-5.4-mini
      - gpt-5-mini
      - gpt-4.1
      - gpt-5.3-codex
      - gpt-5.2-codex
    reviewer_pairs:
      - [claude-opus-4.6, gpt-5.4]
      - [claude-opus-4.5, gpt-5.2]
      - [claude-opus-4.6-1m, gpt-5.1]
      - [claude-sonnet-4.6, gpt-5.3-codex]
      - [claude-sonnet-4.5, gpt-5.2-codex]
      - [claude-sonnet-4, gpt-5.4-mini]
      - [claude-haiku-4.5, gpt-5-mini]
      - [goldeneye, gpt-4.1]
