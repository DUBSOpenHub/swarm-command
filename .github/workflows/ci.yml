name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python3 -m pip install --quiet pyyaml

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml
          from pathlib import Path
          for path in ('config.yml', 'catalog.yml'):
              yaml.safe_load(Path(path).read_text())
              print(f'✅ {path} valid')
          "

      - name: Ensure SKILL.md copies are identical
        run: diff -u skills/swarm-command/SKILL.md .github/skills/swarm-command/SKILL.md

      - name: Validate JSON blocks in context capsule protocol
        run: |
          python3 -c "
          import json, re
          from pathlib import Path
          content = Path('protocols/context-capsule.md').read_text()
          blocks = re.findall(r'\`\`\`json\n(.*?)\n\`\`\`', content, re.S)
          if not blocks:
              raise SystemExit('No JSON blocks found')
          for i, block in enumerate(blocks, 1):
              try:
                  json.loads(block)
                  print(f'✅ JSON block {i} valid')
              except json.JSONDecodeError as e:
                  print(f'⚠️  JSON block {i} skipped (contains placeholders): {e}')
          "
