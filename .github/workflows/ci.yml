name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python3 -m pip install --quiet pyyaml

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml
          from pathlib import Path
          for path in ('config.yml', 'catalog.yml'):
              yaml.safe_load(Path(path).read_text())
              print(f'✅ {path} valid')
          "

      - name: Ensure SKILL.md copies are identical
        run: diff -u skills/swarm-command/SKILL.md .github/skills/swarm-command/SKILL.md

      - name: Validate JSON blocks in context capsule protocol
        run: |
          python3 -c "
          import json, re
          from pathlib import Path
          content = Path('protocols/context-capsule.md').read_text()
          blocks = re.findall(r'\`\`\`json\n(.*?)\n\`\`\`', content, re.S)
          if not blocks:
              raise SystemExit('No JSON blocks found')
          for i, block in enumerate(blocks, 1):
              try:
                  json.loads(block)
                   print(f'✅ JSON block {i} valid')
               except json.JSONDecodeError as e:
                   print(f'⚠️  JSON block {i} skipped (contains placeholders): {e}')
           "

      - name: Validate scale totals across markdown
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path
          import yaml

          config = yaml.safe_load(Path("config.yml").read_text())
          scales = config["swarm_command"]["scales"]
          expected = {
              scale.upper(): int(re.search(r"\d+", str(values["total"])).group())
              for scale, values in scales.items()
          }
          expected_values = set(expected.values())
          md_files = sorted(Path(".").rglob("*.md"))
          issues = []
          hits = []
          seen_scales = {scale: 0 for scale in expected}

          scale_patterns = {
              scale: re.compile(
                  rf"(?i)\b{re.escape(scale)}\b[^\n]{{0,120}}?([~≈]?\s*\d{{1,4}})"
              )
              for scale in expected
          }
          approx_agents_pattern = re.compile(r"(?i)(?:~|≈)\s*(\d{1,4})\s+agents\b")
          total_agents_pattern = re.compile(r"(?i)\btotal\b[^\n]{{0,40}}?([~≈]?\s*\d{1,4})[^\n]{{0,20}}?\bagents\b")

          for path in md_files:
              for line_number, line in enumerate(path.read_text().splitlines(), 1):
                  for scale, pattern in scale_patterns.items():
                      match = pattern.search(line)
                      if not match:
                          continue
                      value = int(re.search(r"\d+", match.group(1)).group())
                      seen_scales[scale] += 1
                      if value != expected[scale]:
                          issues.append(
                              f"❌ {path}:{line_number} has {scale} count {value}, expected ~{expected[scale]}"
                          )
                      else:
                          hits.append(f"✅ {path}:{line_number} matches {scale} → ~{value}")

                  if "agents" in line.lower():
                      for pattern_name, pattern in (
                          ("approximate", approx_agents_pattern),
                          ("total", total_agents_pattern),
                      ):
                          for match in pattern.finditer(line):
                              value = int(re.search(r"\d+", match.group(1)).group())
                              if value not in expected_values:
                                  issues.append(
                                      f"❌ {path}:{line_number} has unexpected {pattern_name} agent count ~{value}: {line.strip()}"
                                  )

          for scale, count in seen_scales.items():
              if count == 0:
                  issues.append(f"❌ No markdown reference found for {scale} total ~{expected[scale]}")

          if hits:
              print("\n".join(hits))
          else:
              print("❌ No matching scale totals found in markdown")
              sys.exit(1)

          if issues:
              print("\n".join(issues))
              sys.exit(1)

          print("✅ Agent count consistency check passed")
          PY

      - name: Validate consensus formula weights across markdown
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path
          import yaml

          config = yaml.safe_load(Path("config.yml").read_text())
          weights = config["swarm_command"]["consensus"]["formula_weights"]
          expected = (
              f"{weights['confidence']:.2f}",
              f"{weights['evidence']:.2f}",
              f"{weights['scope']:.2f}",
              f"{weights['coverage']:.2f}",
          )
          pattern = re.compile(
              r"([0-9]+\.[0-9]+)\s*[×x*]\s*confidence.*?"
              r"([0-9]+\.[0-9]+)\s*[×x*]\s*evidence.*?"
              r"([0-9]+\.[0-9]+)\s*[×x*]\s*scope.*?"
              r"([0-9]+\.[0-9]+)\s*[×x*]\s*coverage",
              re.IGNORECASE | re.DOTALL,
          )

          hits = []
          issues = []

          for path in sorted(Path(".").rglob("*.md")):
              content = path.read_text()
              for match in pattern.finditer(content):
                  found = tuple(f"{float(value):.2f}" for value in match.groups())
                  line_number = content.count("\n", 0, match.start()) + 1
                  if found != expected:
                      issues.append(
                          f"❌ {path}:{line_number} has formula weights {found}, expected {expected}"
                      )
                  else:
                      hits.append(f"✅ {path}:{line_number} matches consensus weights {found}")

          if not hits:
              print("❌ No consensus formulas found in markdown")
              sys.exit(1)

          print("\n".join(hits))
          if issues:
              print("\n".join(issues))
              sys.exit(1)

          print("✅ Consensus formula weight check passed")
          PY

      - name: Validate timeout cascade across markdown
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path
          import yaml

          config = yaml.safe_load(Path("config.yml").read_text())
          expected = config["swarm_command"]["circuit_breaker"]["timeout_cascade"]
          pattern = re.compile(r"timeout_cascade:\s*\[([^\]]+)\]", re.IGNORECASE)

          hits = []
          issues = []

          for path in sorted(Path(".").rglob("*.md")):
              content = path.read_text()
              for match in pattern.finditer(content):
                  found = [int(part.strip()) for part in match.group(1).split(",")]
                  line_number = content.count("\n", 0, match.start()) + 1
                  if found != expected:
                      issues.append(
                          f"❌ {path}:{line_number} has timeout cascade {found}, expected {expected}"
                      )
                  else:
                      hits.append(f"✅ {path}:{line_number} matches timeout cascade {found}")

          if not hits:
              print("❌ No timeout cascade references found in markdown")
              sys.exit(1)

          print("\n".join(hits))
          if issues:
              print("\n".join(issues))
              sys.exit(1)

          print("✅ Timeout cascade check passed")
          PY

      - name: Validate model pool count in README
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path
          import yaml

          config = yaml.safe_load(Path("config.yml").read_text())
          models = config["swarm_command"]["models"]
          expected = len(models["commander_pool"]) + len(models["worker_pool"])
          readme = Path("README.md").read_text()
          matches = list(re.finditer(r"\b(\d+)\s+models\b", readme, re.IGNORECASE))

          if not matches:
              print("❌ README.md does not contain a '<count> models' claim")
              sys.exit(1)

          issues = []
          for match in matches:
              found = int(match.group(1))
              line_number = readme.count("\n", 0, match.start()) + 1
              if found != expected:
                  issues.append(
                      f"❌ README.md:{line_number} says {found} models, expected {expected}"
                  )
              else:
                  print(f"✅ README.md:{line_number} matches model pool count {found}")

          if issues:
              print("\n".join(issues))
              sys.exit(1)

          print("✅ Model pool count check passed")
          PY
